# Production docker-compose for Hetzner deployment
# Image is pulled from GitHub Container Registry (ghcr.io)
# Run: docker compose -f docker-compose.prod.yml up -d

services:
  solr:
    image: solr:9.7-slim
    container_name: kk-info-solr
    volumes:
      - solr-data:/var/solr
      - ./solr_config/conf:/opt/solr/server/solr/configsets/_default/conf:ro
    environment:
      - SOLR_HEAP=512m
    command:
      - solr-precreate
      - kk-info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8983/solr/kk-info/admin/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  kk-info-api:
    # Image is set via KK_IMAGE env var by the GitHub Actions deploy step
    image: ${KK_IMAGE:-ghcr.io/PLACEHOLDER/kk-info:latest}
    container_name: kk-info-api
    ports:
      - "9000:9000"
    volumes:
      # Named volume keeps the database across deployments
      - db-data:/data
    environment:
      - DATABASE_URL=sqlite:////data/kk_info.db
      - SOLR_URL=http://solr:8983/solr/kk-info
    depends_on:
      solr:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  solr-data:
    name: kk-info-solr-data
  db-data:
    name: kk-info-db-data

networks:
  default:
    name: kk-info-network
