# Production docker-compose for Hetzner deployment
# Image is pulled from GitHub Container Registry (ghcr.io)
# Run: docker compose -f docker-compose.prod.yml up -d

services:
  kk-info-api:
    # Image is set via KK_IMAGE env var by the GitHub Actions deploy step
    image: ${KK_IMAGE:-ghcr.io/PLACEHOLDER/kk-info:latest}
    container_name: kk-info-api
    ports:
      - "9000:9000"
    volumes:
      # Named volume keeps the database across deployments
      - db-data:/data
    environment:
      - DATABASE_URL=sqlite:////data/kk_info.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db-data:
    name: kk-info-db-data

networks:
  default:
    name: kk-info-network
