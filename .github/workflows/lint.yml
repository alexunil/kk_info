name: Code Quality Check

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Code auschecken

      - name: Install dependencies
        run: npm install # oder pip install

      - name: Run Linter
        run: npm run lint # Hier wird der Linter gestartet
